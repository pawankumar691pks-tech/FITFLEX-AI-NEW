<script>

let progress = Number(
localStorage.getItem("progress")
) || 0;
let xp = Number(
localStorage.getItem("xp")
) || 0;

let waterCount = Number(
localStorage.getItem("waterCount")
) || 0;

let level = Number(
localStorage.getItem("level")
) || 1;

let streak = Number(
localStorage.getItem("streak")
) || 0;


let totalWorkouts = 0; 

let musicPlaying = false;

const workoutMusic = new Audio(
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
);

let workoutHistory = JSON.parse(
localStorage.getItem(
"workoutHistory"
)
) || [];

let bmiHistory = JSON.parse(
localStorage.getItem(
"bmiHistory"
)
) || [];

let bonusClaimed = false;

let darkMode = true;

// SPEAK
function speak(text){

if(
'speechSynthesis'
in window
){

window.speechSynthesis.cancel();

const speech =

new SpeechSynthesisUtterance(
text
);

speech.lang = "en-US";

speech.rate = 0.9;

speech.pitch = 1;

speech.volume = 1;

window.speechSynthesis.speak(
speech
);
}
}

// REAL TIME GREETING
window.onload = function(){

const hour = new Date().getHours();

let greeting = "";

if(hour >= 5 && hour < 12){

greeting =
"Good Morning";
}

else if(hour >= 12 && hour < 17){

greeting =
"Good Afternoon";
}

else if(hour >= 17 && hour < 21){

greeting =
"Good Evening";
}

else{

greeting =
"Good Night";
}
console.log("Greeting code running");

setTimeout(function(){

console.log(greeting);

speak(
greeting +
" welcome to FitFlex AI"
);

addAIMessage(
greeting +
" welcome to FitFlex AI"
);
setTimeout(function(){

speak(
greeting +
" welcome to FitFlex AI"
);

},3000);

addAIMessage(
"😎 Welcome back! Ready for today's workout?"
);

},1500);

const today = new Date()
.toDateString();

const lastLogin =
localStorage.getItem(
"lastLogin"
);

if(lastLogin !== today){

xp += 10;

localStorage.setItem(
"xp",
xp
);

localStorage.setItem(
"lastLogin",
today
);

setTimeout(function(){

addAIMessage(
"🎁 Daily Login Bonus +10 XP"
);

speak(
"Daily login bonus awarded"
);

},3000);

}
updateProfileCard();
};

// ENTER SEND
document
.getElementById(
"userInput"
)

.addEventListener(

"keypress",

function(event){

if(event.key === "Enter"){

sendMessage();
}
});

// TEST VOICE
function testVoice(){

speak(
"Voice is working in FitFlex AI"
+
" If you can hear this, it's working perfectly!"
+
" Try asking a question or giving a command to see it in action."
+
" FitFlex AI is here to assist you with your fitness journey. Let's get moving and achieve those goals together!"
);
}

// REAL CHATBOT
async function sendMessage(){

const input =

document.getElementById(
"userInput"
);

const message =
input.value.trim();

if(message === "")
return;

addUserMessage(message);

input.value = "";

const chatBox =

document.getElementById(
"chatBox"
);

chatBox.innerHTML += `

<div
class="message ai"
id="typing">

🤖 FitFlex AI typing...

<div class="loader">

<span></span>

<span></span>

<span></span>

</div>

</div>
`;

chatBox.scrollTop =
chatBox.scrollHeight;

try{

const response =

await fetch(

"http://localhost:5000/chat",

{

method:"POST",

headers:{

"Content-Type":
"application/json"
},


body:JSON.stringify({

message:message
})
});

const data =
await response.json();

document
.getElementById(
"typing"
)
.remove();

addAIMessage(
data.reply
);
}

catch(error){

document
.getElementById(
"typing"
)
.remove();

addAIMessage(

"❌ Server not running"
);
}
}

// USER MESSAGE
function addUserMessage(text){

const chatBox =

document.getElementById(
"chatBox"
);

chatBox.innerHTML += `

<div class="message user">

${text}

</div>
`;

chatBox.scrollTop =
chatBox.scrollHeight;
}

// AI MESSAGE
function updateProfileCard(){

document.getElementById("levelCard").innerText = level;

document.getElementById("xpCard").innerText = xp;

document.getElementById("streakCard").innerText = streak;

document.getElementById("waterCard").innerText = waterCount;

const xpNeeded = level * 100;

const xpPercent =

(xp / xpNeeded) * 100;

document.getElementById(
"xpFill"
).style.width =

xpPercent + "%";

document.getElementById(
"xpText"
).innerText =

xp + " / " + xpNeeded + " XP";
}
function showAchievement(text){

const popup =
document.getElementById(
"achievementPopup"
);

popup.innerText = text;

popup.style.display = "block";

setTimeout(function(){

popup.style.display = "none";

},3000);

}
function addAIMessage(text){

const chatBox =

document.getElementById(
"chatBox"
);

chatBox.innerHTML += `

<div class="message ai">

🤖 FitFlex AI:<br>${text}

</div>
`;

speak(text);

chatBox.scrollTop =
chatBox.scrollHeight;
}

// BMI
function calculateBMI(){

const weight =
document.getElementById(
"weight"
).value;

const height =
document.getElementById(
"height"
).value / 100;

if(!weight || !height){

alert(
"Enter weight and height"
);

return;
}

const bmi =
(weight / (height * height))
.toFixed(1);

bmiHistory.push(bmi);

localStorage.setItem(

"bmiHistory",

JSON.stringify(
bmiHistory
)

);

addAIMessage(
"📊 Your BMI is: " +
bmi
);
}

// CALORIES
function calculateCalories(){

const weight =
document.getElementById(
"weight"
).value;

const height =
document.getElementById(
"height"
).value;

const age =
document.getElementById(
"age"
).value;

if(!weight || !height || !age){

alert(
"Enter all details"
);

return;
}

const calories =

(
10 * weight +
6.25 * height -
5 * age + 5
).toFixed(0);

addAIMessage(
"🔥 Daily Calories: " +
calories
);
}

// COMPLETE
function completeWorkout(){

progress += 10;

streak += 1;
updateProfileCard();

totalWorkouts += 1;
const today =

new Date()
.toLocaleDateString();

workoutHistory.push(
today
);

localStorage.setItem(

"workoutHistory",

JSON.stringify(
workoutHistory
)

);
xp += 20;
updateProfileCard();

if(xp >= level * 100){

level++;

addAIMessage(
"🏆 Level Up! You reached Level " +
level
);

showAchievement(
"🏆 Level " + level + " Reached"
);

}

localStorage.setItem(
"xp",
xp
);

localStorage.setItem(
"level",
level
);
localStorage.setItem(
"progress",
progress
);

localStorage.setItem(
"streak",
streak
);

localStorage.setItem(
"totalWorkouts",
totalWorkouts
);

addAIMessage(

"🎉 Workout completed!<br><br>"

+

"📈 Progress: " +
progress +
"%<br><br>"

+

"🔥 Streak: " +
streak
);
speak(
"Congratulations. Workout completed successfully."
);
const audio = new Audio(
"https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
);

audio.play();
}
